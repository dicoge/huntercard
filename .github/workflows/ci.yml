name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check TypeScript types
        run: npx tsc --noEmit
      
      - name: Check for console.log statements
        run: |
          CONSOLE_LOGS=$(grep -r "console.log" src/ --include="*.ts" --include="*.tsx" || true)
          if [ -n "$CONSOLE_LOGS" ]; then
            echo "Warning: Found console.log statements:"
            echo "$CONSOLE_LOGS"
          fi