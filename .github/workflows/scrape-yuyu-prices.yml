name: Scrape Yuyu Prices

on:
  schedule:
    # Run daily at 5:00 AM JST (20:00 UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Install Chrome for Puppeteer
        run: |
          # Add Google Chrome repo and install Chrome
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run yuyu-tei price scraper
        working-directory: scripts
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true node scrape-yuyu-prices.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/yuyu-prices/
          git diff --staged --quiet || git commit -m "chore: update yuyu-tei prices $(date +%Y-%m-%d)"
          git push origin main
