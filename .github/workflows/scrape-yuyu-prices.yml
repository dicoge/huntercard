name: Scrape & Build Database

on:
  schedule:
    # Run daily at 5:00 AM JST (20:00 UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build-database:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate database
        run: |
          CARD_COUNT=$(python3 -c "import json; d=json.load(open('data/database.json')); print(d.get('totalCards',0))" 2>/dev/null || echo "0")
          echo "Database has $CARD_COUNT cards"
          if [ "$CARD_COUNT" -lt 50 ]; then
            echo "❌ SAFETY CHECK FAILED: totalCards=$CARD_COUNT < 50"
            exit 1
          fi
          echo "✅ Validation passed"

      - name: Check data changes against previous commit
        id: check
        run: |
          if git diff --stat HEAD~1 -- 'data/database.json' 'data/images/' | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel via Deploy Hook
        if: steps.check.outputs.changed == 'true'
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}