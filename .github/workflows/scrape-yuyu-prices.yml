name: Scrape Yuyu Prices

on:
  schedule:
    # Run daily at 5:00 AM JST (20:00 UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run yuyu-tei price scraper
        working-directory: scripts
        run: node scrape-yuyu-prices.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/yuyu-prices/
          git diff --staged --quiet || git commit -m "chore: update yuyu-tei prices $(date +%Y-%m-%d)"
          git push origin main
