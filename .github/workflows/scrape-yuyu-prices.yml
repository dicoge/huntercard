name: Scrape & Build Database

on:
  schedule:
    # Run daily at 5:00 AM JST (20:00 UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-database:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update || true
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y             libnss3 libnspr4 ca-certificates fonts-liberation             libappindicator1 libasound2 libatk-bridge2.0-0             libatk1.0-0 libcups2 libdbus-1-3 libgdk-pixbuf2.0-0             libgtk-3-0 libxcomposite1 libxdamage1 libxrandr2             libgbm1 libpango-1.0-0 libxkbcommon0



      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run database builder
        working-directory: scripts
        id: build
        run: node build-database.js
        continue-on-error: true

      - name: Show scrape log if failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "=== SCRAPE LOG ==="
          if [ -f data/scrape-log.txt ]; then
            cat data/scrape-log.txt
          else
            echo "(no scrape log found)"
          fi
          echo "=== END SCRAPE LOG ==="
          exit 1  # Reject the step

      - name: Validate database
        run: |
          CARD_COUNT=$(python3 -c "import json; d=json.load(open('data/database.json')); print(d.get('totalCards',0))" 2>/dev/null || echo "0")
          echo "Database has $CARD_COUNT cards"
          if [ "$CARD_COUNT" -lt 50 ]; then
            echo "❌ SAFETY CHECK FAILED: totalCards=$CARD_COUNT < 50"
            exit 1
          fi
          echo "✅ Validation passed"

      - name: Check data changes
        id: check
        run: |
          if git diff --stat -- 'data/database.json' 'data/images/' | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data has changed"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes"
          fi

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/database.json data/images/
          git diff --staged --quiet || git commit -m "chore: update database $(date +%Y-%m-%d)"
          git push origin main

      - name: Deploy to Vercel via Deploy Hook
        if: steps.check.outputs.changed == 'true'
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}