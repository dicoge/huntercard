name: Scrape Yuyu Prices

on:
  schedule:
    # Run daily at 5:00 AM JST (20:00 UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Install Puppeteer dependencies & Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates fonts-liberation libappindicator3-1 libasound2 libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 lsb-release xdg-utils
          # Install Google Chrome for Puppeteer
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/chrome.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -fy
          rm /tmp/chrome.deb

      - name: Run yuyu-tei price scraper
        working-directory: scripts
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true node scrape-yuyu-prices.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/yuyu-prices/
          git diff --staged --quiet || git commit -m "chore: update yuyu-tei prices $(date +%Y-%m-%d)"
          git push origin main
