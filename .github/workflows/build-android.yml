name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          # Install command-line tools
          ANDROID_HOME=$HOME/android-sdk
          SDK_TOOLS=$ANDROID_HOME/cmdline-tools/latest
          mkdir -p $SDK_TOOLS

          # Download Android command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/
          mv /tmp/cmdline-tools/* $SDK_TOOLS/
          rm -f /tmp/cmdline-tools.zip

          # Accept licenses and install SDK
          yes | $SDK_TOOLS/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $SDK_TOOLS/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" "cmdline-tools;latest" > /dev/null 2>&1 || true

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Prebuild (generate native android project)
        run: npx expo prebuild --platform android --no-install

      - name: Build Android debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: holohunter-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7